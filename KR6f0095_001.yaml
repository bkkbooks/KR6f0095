body:
  text: 那上謨菩上陀夜藥可反下同那謨馱囉上摩夜那謨僧伽夜那摩上阿上弭多婆上夜跢丁可反下同他伽上多夜阿上囉上訶上羝三藐三菩上陀夜跢姪地也反下同他阿上弭唎上羝阿上弭唎都婆上鼙菩繼反下同阿上弭唎跢三婆上鼙阿上弭唎跢鼻菩弭反迦上讕羝伽弭儞伽上伽上那上稽居移反唎底都儞反迦上婆上囉上皤波跢叉楚我反焰迦一切惡業娑上婆訶若能如法受持決定得生彌陀佛國
